experiment_id: "ablation_routing"
description: "Multi-agent routing ablation (RQ4)"
seed: 42
n_runs: 3
dataset: "eval/benchmark_dataset.json"

systems:
  - name: "CodeGraphRAG_Full"
    class: "eval.benchmark.systems.codegraphrag.CodeGraphRAGSystem"
    config_overrides: {}

  - name: "CodeGraphRAG_SingleAgent"
    class: "eval.benchmark.systems.single_agent.SingleAgentSystem"
    config_overrides: {}

metrics:
  retrieval: [recall_at_5]
  generation: [token_f1, exact_match, semantic_similarity]
  system: [mean_s]

statistical:
  significance_test: wilcoxon
  baseline_for_comparison: "CodeGraphRAG_SingleAgent"
