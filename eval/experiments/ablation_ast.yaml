experiment_id: "ablation_ast"
description: "AST-aware chunking ablation (RQ3)"
seed: 42
n_runs: 3
dataset: "eval/benchmark_dataset.json"

systems:
  - name: "CodeGraphRAG_Full"
    class: "eval.benchmark.systems.codegraphrag.CodeGraphRAGSystem"
    config_overrides: {}

  - name: "CodeGraphRAG_NoAST"
    class: "eval.benchmark.systems.no_ast.NoASTSystem"
    config_overrides: {}

metrics:
  retrieval: [recall_at_5, mrr, ndcg_at_5]
  generation: [token_f1]
  system: [mean_s]

statistical:
  significance_test: wilcoxon
  baseline_for_comparison: "CodeGraphRAG_NoAST"
