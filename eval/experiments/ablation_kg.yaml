experiment_id: "ablation_kg"
description: "Knowledge Graph expansion ablation (RQ2)"
seed: 42
n_runs: 3
dataset: "eval/benchmark_dataset.json"

systems:
  - name: "CodeGraphRAG_Full"
    class: "eval.benchmark.systems.codegraphrag.CodeGraphRAGSystem"
    config_overrides: {retrieval.use_graph: true}

  - name: "CodeGraphRAG_NoKG"
    class: "eval.benchmark.systems.no_kg.NoKGSystem"
    config_overrides: {retrieval.use_graph: false}

metrics:
  retrieval: [recall_at_5, mrr, ndcg_at_5]
  generation: [token_f1]
  system: [mean_s]

statistical:
  significance_test: wilcoxon
  baseline_for_comparison: "CodeGraphRAG_NoKG"
