chunking:
  # Larger chunks for dense academic text (vs. 512 for code)
  max_chunk_tokens: 768
  overlap_tokens: 96
  strategy: section_aware

indexing:
  background_batch_size: 64

# DocumentRAG model — handles all research paper Q&A
doc_agent_model: qwen2.5:3b-instruct

device: auto
embedding_model: intfloat/e5-base-v2

llm_backend: ollama

generation:
  # Maximum tokens for LLM responses
  num_predict: 512

ports:
  api: 8000
  ui: 8501

qdrant_path: ./qdrant_storage

reranker_model: cross-encoder/ms-marco-MiniLM-L-6-v2

retrieval:
  rerank_top_k: 5
  use_graph: false
  use_mmr: true
  vector_top_k: 30

router:
  confidence_threshold: 0.6
