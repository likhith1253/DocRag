chunking:
  max_chunk_tokens: 1024
  overlap_tokens: 128
  strategy: section_aware
device: auto
doc_agent_model: qwen2.5:3b-instruct
embedding_model: intfloat/e5-base-v2
generation:
  num_predict: 512
indexing:
  background_batch_size: 64
llm_backend: ollama
ports:
  api: 8000
  ui: 8501
qdrant_path: ./qdrant_storage
reranker_model: cross-encoder/ms-marco-MiniLM-L-6-v2
retrieval:
  rerank_top_k: 20
  use_graph: false
  use_mmr: true
  vector_top_k: 100
router:
  confidence_threshold: 0.6
workers:
  parse_workers: 4
  qa_workers: 2
